name: Deploy Frontend naar Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dependencies installeren
        working-directory: client
        run: npm install

      - name: Bouwen
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: https://api-spellensite.azurewebsites.net/api

      - name: Deployen naar Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true
